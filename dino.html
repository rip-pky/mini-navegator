<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dino Runner - Zenith</title>
    <style>
        body { margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(180deg, #0f172a 0%, #08101b 100%); color: #f8fafc; font-family: Inter, Arial, sans-serif; }
        .game-shell { width: min(640px, 90vw); padding: 24px; border-radius: 24px; background: rgba(15, 23, 42, 0.95); border: 1px solid rgba(148, 163, 184, 0.18); box-shadow: 0 34px 90px rgba(0,0,0,0.35); text-align: center; }
        h1 { margin: 0 0 10px; font-size: 2rem; }
        p { color: #94a3b8; margin: 0 0 18px; }
        canvas { width: 100%; max-width: 600px; background: #111827; border-radius: 18px; display: block; margin: 0 auto 18px; }
        button { border: none; padding: 12px 20px; border-radius: 14px; background: #2563eb; color: white; cursor: pointer; font-size: 1rem; }
        .info { display: flex; justify-content: center; gap: 16px; flex-wrap: wrap; margin-bottom: 14px; }
        .info span { background: rgba(148, 163, 184, 0.12); padding: 10px 14px; border-radius: 12px; }
    </style>
</head>
<body>
    <div class="game-shell">
        <h1>Jogo do Dino</h1>
        <p>Use a barra de espaço para pular e sobreviver o máximo possível.</p>
        <div class="info">
            <span>Pontuação: <strong id="score">0</strong></span>
            <span>Velocidade: <strong id="speed">5</strong></span>
        </div>
        <canvas id="canvas" width="600" height="180"></canvas>
        <button id="restart">Reiniciar</button>
    </div>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const scoreLabel = document.getElementById('score');
        const speedLabel = document.getElementById('speed');
        const restartBtn = document.getElementById('restart');
        let dino = { x: 50, y: 130, width: 34, height: 44, dy: 0, gravity: 1.6, grounded: true };
        let obstacles = [];
        let score = 0;
        let speed = 5;
        let running = false;
        let gameOver = false;

        function draw() {
            ctx.fillStyle = '#111827';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#ffffff';
            ctx.fillRect(dino.x, dino.y, dino.width, dino.height);

            obstacles.forEach(obstacle => {
                ctx.fillRect(obstacle.x, obstacle.y, obstacle.width, obstacle.height);
            });

            ctx.fillStyle = '#94a3b8';
            ctx.fillRect(0, 170, canvas.width, 8,);
        }

        function update() {
            if (!running) return;
            if (!gameOver) {
                dino.dy += dino.gravity;
                dino.y += dino.dy;
                if (dino.y > 130) {
                    dino.y = 130;
                    dino.dy = 0;
                    dino.grounded = true;
                }

                obstacles.forEach(obstacle => {
                    obstacle.x -= speed;
                });

                if (obstacles.length === 0 || obstacles[obstacles.length - 1].x < 360) {
                    obstacles.push({ x: 620, y: 140, width: 20 + Math.random() * 20, height: 35 });
                }

                obstacles = obstacles.filter(obstacle => obstacle.x + obstacle.width > 0);
                obstacles.forEach(obstacle => {
                    if (dino.x < obstacle.x + obstacle.width && dino.x + dino.width > obstacle.x && dino.y < obstacle.y + obstacle.height && dino.y + dino.height > obstacle.y) {
                        gameOver = true;
                    }
                });

                score += 1;
                if (score % 150 === 0) {
                    speed += 0.4;
                    speedLabel.textContent = speed.toFixed(1);
                }
                scoreLabel.textContent = score;
            }
            draw();
            requestAnimationFrame(update);
        }

        function jump() {
            if (dino.grounded && !gameOver) {
                dino.dy = -18;
                dino.grounded = false;
            }
        }

        window.addEventListener('keydown', event => {
            if (event.code === 'Space') {
                event.preventDefault();
                jump();
            }
        });

        function restart() {
            obstacles = [];
            score = 0;
            speed = 5;
            gameOver = false;
            dino.y = 130;
            dino.dy = 0;
            dino.grounded = true;
            scoreLabel.textContent = score;
            speedLabel.textContent = speed.toFixed(1);
            running = true;
        }

        restartBtn.addEventListener('click', restart);
        restart();
        update();
    </script>
</body>
</html>
