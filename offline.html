<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sem conexão - Zenith</title>
    <style>
        body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: linear-gradient(180deg, #0f172a 0%, #020617 100%); color: #e2e8f0; font-family: Inter, Arial, sans-serif; }
        .card { max-width: 620px; background: rgba(15, 23, 42, 0.96); border-radius: 28px; padding: 34px 32px; text-align: center; box-shadow: 0 36px 90px rgba(0, 0, 0, 0.28); border: 1px solid rgba(148, 163, 184, 0.12); }
        h1 { margin: 0 0 18px; font-size: 2.4rem; }
        p { margin: 0 0 24px; color: #94a3b8; line-height: 1.7; }
        .button { padding: 14px 22px; background: #3b82f6; color: white; border: none; border-radius: 16px; font-size: 1rem; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Você está offline</h1>
        <p>O Zenith Navigator parece não estar conectado à internet. Use recursos locais ou tente novamente quando estiver online.</p>
        <button class="button" onclick="window.location.reload();">Tentar novamente</button>
    </div>
</body>
</html>
